<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StringTune - Guitar Tuner</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app">
        <div id="screen">
            <h1>StringTune</h1>
            <div class="tuner-container">
                <div id="noteDisplay">-</div>
                <div id="statusIndicator">Ready</div>
                <div id="frequencyDisplay">0.00 Hz</div>
            </div>

            <div class="string-selectors">
                <button class="string-btn active" data-note="Auto">Auto</button>
                <button class="string-btn" data-note="E2">E</button>
                <button class="string-btn" data-note="A2">A</button>
                <button class="string-btn" data-note="D3">D</button>
                <button class="string-btn" data-note="G3">G</button>
                <button class="string-btn" data-note="B3">B</button>
                <button class="string-btn" data-note="E4">e</button>
            </div>
            
            <div class="input-group">
                <button id="startBtn">Start Tuner</button>
            </div>
        </div>

        <nav id="tunerNav">
            <canvas id="meterCanvas"></canvas>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
