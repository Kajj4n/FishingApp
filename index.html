<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishing Conditions</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0077be">
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./service-worker.js")
                    .then(reg => console.log("SW registered"))
                    .catch(err => console.log("SW failed", err));
            });
        }
    </script>
</head>
<body>
    <div id="app">
        <div id="screen">
            <h1>Fisherman's Forecast</h1>
            <div class="input-group">
                <input type="text" id="locationInput" placeholder="Enter city (e.g., Växjö)">
                <button id="checkBtn">Check Conditions</button>
            </div>
        </div>

        <div id="result" class="fade-in"></div>

        <nav id="liquidNav">
            <canvas id="waterCanvas"></canvas>
            <div class="nav-buttons">
                <button class="nav-item" data-index="0"><span>Weather</span></button>
                <button class="nav-item" data-index="1"><span>Catch</span></button>
                <button class="nav-item" data-index="2"><span>Map</span></button>
            </div>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
